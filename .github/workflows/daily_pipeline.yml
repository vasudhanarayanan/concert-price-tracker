name: Daily Ingestion

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ingestion
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          DUCKDB_PATH: data/concert_tracker.duckdb
        run: python scripts/run_ingestion.py

      - name: Run dbt transforms
        run: cd transform && dbt run --profiles-dir .

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/concert_tracker.duckdb
          git diff --cached --quiet || git commit -m "Daily snapshot: $(date +%Y-%m-%d)"
          git push
